name: Deploy to GitHub Pages

permissions:
  contents: write   # ← это обязательно, чтобы мог создать ветку gh-pages

on:
  push:
    branches: [ master ]   # если у тебя main — замени на main
  workflow_dispatch:       # чтобы можно было запустить вручную

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: node build

      - name: Copy index to 404 for SPA
        run: cp public/index.html public/404.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true   # помогает при первом деплое
